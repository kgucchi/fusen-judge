<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f172a">
<title>フセンジャッジ</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%23f59e0b' rx='20' width='100' height='100'/><text x='50' y='68' text-anchor='middle' font-size='50'>📋</text></svg>">
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f172a;--bg2:#1e293b;--bg3:#334155;
  --text:#f8fafc;--text2:#94a3b8;--text3:#64748b;
  --red:#dc2626;--red-light:#fca5a5;--red-bg:rgba(220,38,38,.12);
  --blue:#2563eb;--blue-light:#93c5fd;--blue-bg:rgba(37,99,235,.12);
  --accent:#f59e0b;--accent2:#fbbf24;
  --card:#1e293b;--card-border:#334155;
  --radius:16px;--radius-sm:10px;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
html,body{
  height:100%;width:100%;overflow:hidden;
  font-family:-apple-system,BlinkMacSystemFont,'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;
  background:var(--bg);color:var(--text);
  -webkit-tap-highlight-color:transparent;
  -webkit-text-size-adjust:100%;
}

/* ===== Screens ===== */
.screen{
  position:absolute;inset:0;
  display:flex;flex-direction:column;
  transition:transform .35s cubic-bezier(.4,0,.2,1),opacity .35s;
  will-change:transform,opacity;
  padding-top:var(--safe-top);
  padding-bottom:var(--safe-bottom);
}
.screen.hidden{pointer-events:none;opacity:0;transform:translateX(100%)}
.screen.hidden-left{pointer-events:none;opacity:0;transform:translateX(-30%)}

/* ===== Header ===== */
.header{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 20px;min-height:56px;
  background:rgba(15,23,42,.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(255,255,255,.06);
  z-index:10;position:relative;
}
.header-title{
  font-size:18px;font-weight:800;letter-spacing:.5px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.header-btn{
  background:rgba(255,255,255,.08);border:none;color:var(--text);
  font-size:13px;padding:8px 14px;border-radius:20px;
  display:flex;align-items:center;gap:6px;cursor:pointer;
  transition:background .2s;
}
.header-btn:active{background:rgba(255,255,255,.15)}
.header-btn svg{width:16px;height:16px}
.badge{
  background:var(--accent);color:#000;font-size:11px;font-weight:700;
  min-width:20px;height:20px;border-radius:10px;
  display:inline-flex;align-items:center;justify-content:center;padding:0 6px;
}

/* ===== Camera Screen ===== */
.camera-body{flex:1;display:flex;flex-direction:column;position:relative;overflow:hidden}
.video-wrap{
  flex:1;position:relative;display:flex;align-items:center;justify-content:center;
  background:#000;overflow:hidden;
}
#video{width:100%;height:100%;object-fit:cover}
.guide-frame{
  position:absolute;width:72%;aspect-ratio:1.2;
  border:2.5px dashed rgba(255,255,255,.5);border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  transition:border-color .3s,box-shadow .3s;
  pointer-events:none;
}
.guide-frame.detected{border-color:#22c55e;box-shadow:0 0 30px rgba(34,197,94,.2)}
.guide-text{
  position:absolute;bottom:16px;
  background:rgba(0,0,0,.6);backdrop-filter:blur(8px);
  padding:8px 18px;border-radius:20px;
  font-size:13px;color:rgba(255,255,255,.85);
  pointer-events:none;white-space:nowrap;
}
.camera-controls{
  padding:20px 20px calc(20px + var(--safe-bottom));
  display:flex;flex-direction:column;align-items:center;gap:12px;
  background:linear-gradient(to top,var(--bg) 60%,transparent);
  position:relative;z-index:2;
}
.btn-capture{
  width:76px;height:76px;border-radius:50%;border:4px solid var(--accent);
  background:transparent;cursor:pointer;position:relative;
  transition:transform .15s;
}
.btn-capture::after{
  content:'';position:absolute;inset:6px;border-radius:50%;
  background:var(--accent);transition:transform .1s;
}
.btn-capture:active{transform:scale(.92)}
.btn-capture:active::after{transform:scale(.85)}
.camera-sub-btns{display:flex;gap:12px}
.btn-gallery{
  background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);
  color:var(--text);padding:10px 20px;border-radius:25px;
  font-size:14px;cursor:pointer;display:flex;align-items:center;gap:6px;
  transition:background .2s;
}
.btn-gallery:active{background:rgba(255,255,255,.2)}
#fileInput{display:none}

.camera-hint{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  text-align:center;color:var(--text2);z-index:3;
}
.camera-hint svg{width:48px;height:48px;margin-bottom:12px;opacity:.4}
.camera-hint p{font-size:14px;line-height:1.6}

/* ===== Processing Overlay ===== */
.processing{
  position:absolute;inset:0;z-index:100;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:rgba(15,23,42,.92);backdrop-filter:blur(20px);
  opacity:0;pointer-events:none;transition:opacity .3s;
}
.processing.active{opacity:1;pointer-events:auto}
.spinner{
  width:64px;height:64px;border-radius:50%;
  border:3px solid var(--bg3);border-top-color:var(--accent);
  animation:spin .8s linear infinite;margin-bottom:24px;
}
@keyframes spin{to{transform:rotate(360deg)}}
.processing-text{font-size:16px;color:var(--text2);text-align:center;line-height:1.6}
.processing-step{
  margin-top:16px;display:flex;flex-direction:column;gap:8px;align-items:center;
}
.step-item{
  font-size:13px;color:var(--text3);display:flex;align-items:center;gap:8px;
  transition:color .3s;
}
.step-item.active{color:var(--accent)}
.step-item.done{color:#22c55e}
.step-dot{width:8px;height:8px;border-radius:50%;background:currentColor;flex-shrink:0}

/* ===== Result Screen ===== */
.result-body{
  flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:16px 20px calc(100px + var(--safe-bottom));
}
.result-image{
  width:100%;aspect-ratio:4/3;object-fit:cover;
  border-radius:var(--radius);margin-bottom:16px;
  border:1px solid var(--card-border);
}
.result-ocr{
  background:var(--card);border:1px solid var(--card-border);
  border-radius:var(--radius-sm);padding:14px 16px;margin-bottom:16px;
}
.result-ocr-label{font-size:12px;color:var(--text3);margin-bottom:6px;display:flex;align-items:center;gap:6px}
.result-ocr-text{font-size:17px;line-height:1.6;color:var(--text)}

.result-card{
  border-radius:var(--radius);padding:24px 20px;margin-bottom:16px;
  text-align:center;position:relative;overflow:hidden;
  animation:slideUp .4s cubic-bezier(.16,1,.3,1) forwards;
}
@keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
.result-card.temodori{background:linear-gradient(135deg,#dc2626,#b91c1c)}
.result-card.temachi{background:linear-gradient(135deg,#2563eb,#1d4ed8)}
.result-icon{font-size:40px;margin-bottom:8px}
.result-type{font-size:34px;font-weight:900;letter-spacing:4px;color:#fff;text-shadow:0 2px 8px rgba(0,0,0,.3)}
.result-sub{font-size:16px;color:rgba(255,255,255,.8);margin-top:4px}
.result-confidence{
  display:inline-flex;align-items:center;gap:6px;
  margin-top:12px;padding:6px 14px;
  background:rgba(255,255,255,.15);border-radius:20px;
  font-size:13px;color:rgba(255,255,255,.9);
}

.result-detail{
  background:var(--card);border:1px solid var(--card-border);
  border-radius:var(--radius-sm);padding:16px;margin-bottom:16px;
}
.result-detail-row{
  display:flex;justify-content:space-between;align-items:flex-start;
  padding:8px 0;
}
.result-detail-row+.result-detail-row{border-top:1px solid var(--card-border)}
.detail-label{font-size:13px;color:var(--text3);flex-shrink:0;width:80px}
.detail-value{font-size:15px;color:var(--text);text-align:right;flex:1}

.btn-switch{
  display:block;width:100%;padding:14px;
  background:transparent;border:1.5px solid var(--card-border);
  color:var(--text2);font-size:15px;border-radius:var(--radius-sm);
  cursor:pointer;text-align:center;transition:all .2s;margin-bottom:12px;
}
.btn-switch:active{background:rgba(255,255,255,.05);border-color:var(--text3)}
.btn-switch .switch-hint{font-size:12px;color:var(--text3);margin-top:2px}

.result-footer{
  position:fixed;bottom:0;left:0;right:0;
  padding:16px 20px calc(16px + var(--safe-bottom));
  background:linear-gradient(to top,var(--bg) 70%,transparent);
  z-index:10;
}
.btn-next{
  width:100%;padding:18px;border:none;border-radius:var(--radius);
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#000;font-size:17px;font-weight:700;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:8px;
  transition:transform .15s;box-shadow:0 4px 20px rgba(245,158,11,.3);
}
.btn-next:active{transform:scale(.97)}

/* ===== History Screen ===== */
.history-body{
  flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:16px 20px calc(100px + var(--safe-bottom));
}
.summary-cards{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.summary-card{
  border-radius:var(--radius-sm);padding:20px 16px;text-align:center;
  border:1px solid;
}
.summary-card.temodori{background:var(--red-bg);border-color:rgba(220,38,38,.2)}
.summary-card.temachi{background:var(--blue-bg);border-color:rgba(37,99,235,.2)}
.summary-icon{font-size:24px;margin-bottom:4px}
.summary-label{font-size:13px;color:var(--text2);margin-bottom:4px}
.summary-count{font-size:32px;font-weight:800}
.summary-card.temodori .summary-count{color:var(--red-light)}
.summary-card.temachi .summary-count{color:var(--blue-light)}
.summary-unit{font-size:14px;font-weight:400;color:var(--text2)}

.history-section-title{font-size:13px;color:var(--text3);margin-bottom:12px;padding-left:4px}

.history-list{display:flex;flex-direction:column;gap:10px}
.history-item{
  background:var(--card);border:1px solid var(--card-border);
  border-radius:var(--radius-sm);padding:14px 16px;
  display:flex;align-items:center;gap:14px;
  cursor:pointer;transition:background .2s;
  border-left:4px solid;
}
.history-item:active{background:var(--bg3)}
.history-item.temodori{border-left-color:var(--red)}
.history-item.temachi{border-left-color:var(--blue)}
.history-thumb{
  width:48px;height:48px;border-radius:8px;object-fit:cover;flex-shrink:0;
  background:var(--bg3);
}
.history-info{flex:1;min-width:0}
.history-type{font-size:12px;font-weight:700;margin-bottom:2px}
.history-item.temodori .history-type{color:var(--red-light)}
.history-item.temachi .history-type{color:var(--blue-light)}
.history-text{font-size:14px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.history-cat{font-size:12px;color:var(--text3);margin-top:2px}
.history-time{font-size:12px;color:var(--text3);flex-shrink:0}

.empty-state{text-align:center;padding:60px 20px;color:var(--text3)}
.empty-state svg{width:64px;height:64px;margin-bottom:16px;opacity:.3}
.empty-state p{font-size:15px;line-height:1.6}

.history-footer{
  position:fixed;bottom:0;left:0;right:0;
  padding:16px 20px calc(16px + var(--safe-bottom));
  background:linear-gradient(to top,var(--bg) 70%,transparent);z-index:10;
}

/* ===== Canvas (hidden) ===== */
#canvas{display:none}

/* ===== Flash effect ===== */
.flash{
  position:fixed;inset:0;background:#fff;z-index:200;
  opacity:0;pointer-events:none;
}
.flash.active{animation:flash .3s ease-out}
@keyframes flash{0%{opacity:.8}100%{opacity:0}}

/* ===== Toast ===== */
.toast{
  position:fixed;top:calc(16px + var(--safe-top));left:50%;transform:translateX(-50%) translateY(-100px);
  background:var(--card);border:1px solid var(--card-border);
  padding:12px 24px;border-radius:25px;font-size:14px;color:var(--text);
  z-index:300;transition:transform .3s cubic-bezier(.16,1,.3,1);
  box-shadow:0 8px 30px rgba(0,0,0,.4);white-space:nowrap;
}
.toast.show{transform:translateX(-50%) translateY(0)}

/* ===== Landscape warning ===== */
@media(orientation:landscape) and (max-height:500px){
  .landscape-warn{display:flex!important}
}
.landscape-warn{
  display:none;position:fixed;inset:0;z-index:999;
  background:var(--bg);align-items:center;justify-content:center;
  flex-direction:column;gap:16px;color:var(--text2);font-size:16px;
}
</style>
</head>
<body>

<!-- Landscape Warning -->
<div class="landscape-warn">
  <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="2"><rect x="6" y="12" width="36" height="24" rx="3"/><path d="M24 32v4M20 36h8"/></svg>
  <p>縦向きでご利用ください</p>
</div>

<!-- Flash Effect -->
<div class="flash" id="flash"></div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- ==================== CAMERA SCREEN ==================== -->
<div class="screen" id="screenCamera">
  <div class="header">
    <div class="header-title">フセンジャッジ</div>
    <button class="header-btn" onclick="showHistory()">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 8v4l3 3"/><circle cx="12" cy="12" r="9"/></svg>
      履歴
      <span class="badge" id="badgeCount">0</span>
    </button>
  </div>
  <div class="camera-body">
    <div class="video-wrap">
      <video id="video" autoplay playsinline muted></video>
      <div class="guide-frame" id="guideFrame">
        <span class="guide-text" id="guideText">付箋をここに合わせてね</span>
      </div>
      <div class="camera-hint" id="cameraHint" style="display:none">
        <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M6.827 6.175A2.31 2.31 0 015.186 7.23c-.38.054-.757.112-1.134.175C2.999 7.58 2.25 8.507 2.25 9.574V18a2.25 2.25 0 002.25 2.25h15A2.25 2.25 0 0021.75 18V9.574c0-1.067-.75-1.994-1.802-2.169a47.865 47.865 0 00-1.134-.175 2.31 2.31 0 01-1.64-1.055l-.822-1.316a2.192 2.192 0 00-1.736-1.039 48.774 48.774 0 00-5.232 0 2.192 2.192 0 00-1.736 1.039l-.821 1.316z"/><circle cx="12" cy="13.5" r="3.5"/></svg>
        <p>カメラを起動しています...</p>
      </div>
    </div>
    <div class="camera-controls">
      <button class="btn-capture" id="btnCapture" onclick="capture()" aria-label="撮影"></button>
      <div class="camera-sub-btns">
        <button class="btn-gallery" onclick="document.getElementById('fileInput').click()">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M3 16l5-5 4 4 3-3 6 6"/><circle cx="15.5" cy="8.5" r="1.5"/></svg>
          写真から選ぶ
        </button>
      </div>
      <input type="file" id="fileInput" accept="image/*" onchange="handleFile(event)">
    </div>
  </div>

  <!-- Processing Overlay -->
  <div class="processing" id="processing">
    <div class="spinner"></div>
    <div class="processing-text" id="processingText">読み取り中...</div>
    <div class="processing-step">
      <div class="step-item active" id="step1"><span class="step-dot"></span>付箋の色を検出</div>
      <div class="step-item" id="step2"><span class="step-dot"></span>テキストを読み取り</div>
      <div class="step-item" id="step3"><span class="step-dot"></span>分類を判定</div>
    </div>
  </div>
</div>

<!-- ==================== RESULT SCREEN ==================== -->
<div class="screen hidden" id="screenResult">
  <div class="header">
    <button class="header-btn" onclick="backToCamera()" style="padding-left:10px">
      <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7"/></svg>
      戻る
    </button>
    <div class="header-title">判定結果</div>
    <div style="width:60px"></div>
  </div>
  <div class="result-body" id="resultBody">
    <!-- Filled by JS -->
  </div>
  <div class="result-footer">
    <button class="btn-next" onclick="backToCamera()">
      <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M6.827 6.175A2.31 2.31 0 015.186 7.23c-.38.054-.757.112-1.134.175C2.999 7.58 2.25 8.507 2.25 9.574V18a2.25 2.25 0 002.25 2.25h15A2.25 2.25 0 0021.75 18V9.574c0-1.067-.75-1.994-1.802-2.169a47.865 47.865 0 00-1.134-.175 2.31 2.31 0 01-1.64-1.055l-.822-1.316a2.192 2.192 0 00-1.736-1.039 48.774 48.774 0 00-5.232 0 2.192 2.192 0 00-1.736 1.039l-.821 1.316z"/><circle cx="12" cy="13.5" r="3.5"/></svg>
      もう1枚撮る
    </button>
  </div>
</div>

<!-- ==================== HISTORY SCREEN ==================== -->
<div class="screen hidden" id="screenHistory">
  <div class="header">
    <button class="header-btn" onclick="backToCamera()" style="padding-left:10px">
      <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7"/></svg>
      戻る
    </button>
    <div class="header-title">撮影履歴</div>
    <button class="header-btn" id="btnClearHistory" onclick="clearHistory()" style="color:var(--red-light);display:none">
      クリア
    </button>
  </div>
  <div class="history-body" id="historyBody">
    <!-- Filled by JS -->
  </div>
  <div class="history-footer">
    <button class="btn-next" onclick="backToCamera()">
      <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M6.827 6.175A2.31 2.31 0 015.186 7.23c-.38.054-.757.112-1.134.175C2.999 7.58 2.25 8.507 2.25 9.574V18a2.25 2.25 0 002.25 2.25h15A2.25 2.25 0 0021.75 18V9.574c0-1.067-.75-1.994-1.802-2.169a47.865 47.865 0 00-1.134-.175 2.31 2.31 0 01-1.64-1.055l-.822-1.316a2.192 2.192 0 00-1.736-1.039 48.774 48.774 0 00-5.232 0 2.192 2.192 0 00-1.736 1.039l-.821 1.316z"/><circle cx="12" cy="13.5" r="3.5"/></svg>
      撮影に戻る
    </button>
  </div>
</div>

<canvas id="canvas"></canvas>

<script>
// ==================== KNOWLEDGE BASE ====================
const KB = {
  temodori: {

    sub: '（やり直し）',

        '材料の保管場所が悪い','先行手配していなかった'

      '技術・施工品質': [
        '墨出しの間違い','施工要領書を読んでいない','未熟な職人に任せた','施工手順を間違えた',

async function initCamera() {
  const video = document.getElementById('video');
  const hint = document.getElementById('cameraHint');
  try {
    hint.style.display = 'flex';
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } },
      audio: false
    });
    cameraStream = stream;
    video.srcObject = stream;
    hint.style.display = 'none';
  } catch (e) {
    hint.querySelector('p').textContent = 'カメラが使えません。\n「写真から選ぶ」をお使いください。';
    document.getElementById('btnCapture').style.display = 'none';
    document.getElementById('guideFrame').style.display = 'none';
  }
}

function capture() {
  const video = document.getElementById('video');
  if (!video.srcObject) return;
  const canvas = document.getElementById('canvas');
  const w = video.videoWidth || 1280;
  const h = video.videoHeight || 720;
  canvas.width = w; canvas.height = h;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(video, 0, 0, w, h);
  // Flash
  const flash = document.getElementById('flash');
  flash.classList.add('active');
  setTimeout(() => flash.classList.remove('active'), 350);
  // Vibrate
  if (navigator.vibrate) navigator.vibrate(50);

  currentImageData = canvas.toDataURL('image/jpeg', 0.85);
  processImage(canvas);
}

function handleFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    const img = new Image();
    img.onload = function() {
      const canvas = document.getElementById('canvas');
      // Resize to max 1600
      let w = img.width, h = img.height;
      if (w > 1600) { h = h * 1600 / w; w = 1600; }
      if (h > 1600) { w = w * 1600 / h; h = 1600; }
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);
      currentImageData = canvas.toDataURL('image/jpeg', 0.85);
      processImage(canvas);
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
  e.target.value = '';
}

// ==================== COLOR DETECTION ====================
function detectColor(canvas) {
  const ctx = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;
  // Sample center 60%
  const x1 = Math.floor(w * 0.2), y1 = Math.floor(h * 0.2);
  const x2 = Math.floor(w * 0.8), y2 = Math.floor(h * 0.8);
  const imgData = ctx.getImageData(x1, y1, x2 - x1, y2 - y1);
  const d = imgData.data;
  const total = d.length / 4;
  let redCount = 0, blueCount = 0;

  for (let i = 0; i < d.length; i += 16) { // Sample every 4th pixel for speed
    const r = d[i], g = d[i+1], b = d[i+2];
    const [hue, sat, val] = rgbToHsv(r, g, b);
    if (sat > 0.25 && val > 0.2) {
      if ((hue < 40 || hue > 320) && r > g && r > b) redCount++;
      else if (hue > 190 && hue < 270 && b > r) blueCount++;
    }
  }

  const sampled = total / 4;
  const redRatio = redCount / sampled;
  const blueRatio = blueCount / sampled;

  let color = 'unknown', confidence = 0;
  if (redRatio > blueRatio && redRatio > 0.15) {
    color = 'red';
    confidence = Math.min(redRatio / 0.5, 1);
  } else if (blueRatio > redRatio && blueRatio > 0.15) {
    color = 'blue';
    confidence = Math.min(blueRatio / 0.5, 1);
  }

  return { color, confidence, redRatio, blueRatio };
}

function rgbToHsv(r, g, b) {
  r /= 255; g /= 255; b /= 255;
  const max = Math.max(r, g, b), min = Math.min(r, g, b);
  const d = max - min;
  let h = 0, s = max === 0 ? 0 : d / max, v = max;
  if (d !== 0) {
    if (max === r) h = ((g - b) / d + 6) % 6;
    else if (max === g) h = (b - r) / d + 2;
    else h = (r - g) / d + 4;
    h *= 60;
  }
  return [h, s, v];
}

// ==================== OCR (Tesseract.js) ====================
let tesseractWorker = null;
let tesseractReady = false;
let tesseractLoading = false;

async function initTesseract() {
  if (tesseractReady || tesseractLoading) return;
  tesseractLoading = true;
  try {
    tesseractWorker = await Tesseract.createWorker('jpn', 1, {
      logger: m => {
        if (m.status === 'recognizing text') {
          const pct = Math.round((m.progress || 0) * 100);
          const s2 = document.getElementById('step2');
          if (s2) s2.querySelector('.step-dot').nextSibling.textContent = `テキストを読み取り (${pct}%)`;
        }
      }
    });
    await tesseractWorker.setParameters({
      tessedit_pageseg_mode: Tesseract.PSM.SINGLE_BLOCK,
    });
    tesseractReady = true;
    console.log('Tesseract.js ready');
  } catch (e) {
    console.warn('Tesseract init failed:', e);
    tesseractReady = false;
  }
  tesseractLoading = false;
}

// 付箋の色に応じた前処理でOCR精度向上
function preprocessForOCR(canvas, detectedColor) {
  const ctx = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;
  const imgData = ctx.getImageData(0, 0, w, h);
  const d = imgData.data;

  const procCanvas = document.createElement('canvas');
  procCanvas.width = w; procCanvas.height = h;
  const pCtx = procCanvas.getContext('2d');
  const procData = pCtx.createImageData(w, h);
  const pd = procData.data;

  // 1) 色チャネル選択でグレースケール化
  const grayValues = new Uint8Array(w * h);
  for (let i = 0; i < d.length; i += 4) {
    let gray;
    if (detectedColor === 'red') {
      gray = d[i + 1]; // 緑チャネル（赤背景でコントラスト良好）
    } else if (detectedColor === 'blue') {
      gray = d[i]; // 赤チャネル（青背景でコントラスト良好）
    } else {
      gray = 0.299 * d[i] + 0.587 * d[i+1] + 0.114 * d[i+2];
    }
    grayValues[i / 4] = gray;
  }

  // 2) 大津の二値化で閾値算出
  const histogram = new Array(256).fill(0);
  for (let i = 0; i < grayValues.length; i++) histogram[grayValues[i]]++;
  let total = grayValues.length, sum = 0;
  for (let i = 0; i < 256; i++) sum += i * histogram[i];
  let sumB = 0, wB = 0, maxVar = 0, threshold = 128;
  for (let t = 0; t < 256; t++) {
    wB += histogram[t]; if (wB === 0) continue;
    const wF = total - wB; if (wF === 0) break;
    sumB += t * histogram[t];
    const mB = sumB / wB, mF = (sum - sumB) / wF;
    const v = wB * wF * (mB - mF) * (mB - mF);
    if (v > maxVar) { maxVar = v; threshold = t; }
  }

  // 3) 二値化適用（コントラスト強調）
  for (let i = 0; i < grayValues.length; i++) {
    const val = grayValues[i] < threshold ? 0 : 255;
    const pi = i * 4;
    pd[pi] = pd[pi+1] = pd[pi+2] = val;
    pd[pi+3] = 255;
  }

  pCtx.putImageData(procData, 0, 0);
  return procCanvas;
}

async function runOCR(canvas, detectedColor) {
  if (!tesseractReady) {
    await initTesseract();
  }
  if (!tesseractReady) return '';

  try {
    // 前処理済み画像でOCR
    const processed = preprocessForOCR(canvas, detectedColor);
    const { data } = await tesseractWorker.recognize(processed.toDataURL('image/png'));
    // テキストをクリーンアップ
    let text = (data.text || '').trim();
    text = text.replace(/[\n\r]+/g, ' ').replace(/\s+/g, ' ');
    // 短すぎるor記号だけなら空文字扱い
    const cleaned = text.replace(/[^\p{L}\p{N}]/gu, '');
    if (cleaned.length < 2) return '';
    return text;
  } catch (e) {
    console.warn('OCR error:', e);
    return '';
  }
}

// ==================== KEYWORD MATCHING ====================
function matchKeywords(text) {
  if (!text || text.length < 2) return null;

  const normalizedText = text.replace(/[\s\u3000　]/g, '').toLowerCase();
  let bestMatch = null;
  let bestScore = 0;

  for (const [typeKey, typeData] of Object.entries(KB)) {
    for (const [catName, items] of Object.entries(typeData.categories)) {
      for (const item of items) {
        const normItem = item.replace(/[\s\u3000　]/g, '').toLowerCase();
        const score = calcSimilarity(normalizedText, normItem);
        if (score > bestScore) {
          bestScore = score;
          bestMatch = { type: typeKey, category: catName, item, score };
        }
      }
    }
  }

  // Check aruaru
  for (const item of ARUARU) {
    const normItem = item.replace(/[\s\u3000　]/g, '').toLowerCase();
    const score = calcSimilarity(normalizedText, normItem);
    if (score > bestScore) {
      bestScore = score;
      bestMatch = { type: 'temodori', category: '現場あるある', item, score };
    }
  }

  return bestMatch;
}

function calcSimilarity(a, b) {
  if (a.length < 2 || b.length < 2) return 0;
  // 2-gram overlap
  const gramsA = new Set(), gramsB = new Set();
  for (let i = 0; i < a.length - 1; i++) gramsA.add(a.slice(i, i + 2));
  for (let i = 0; i < b.length - 1; i++) gramsB.add(b.slice(i, i + 2));
  let overlap = 0;
  for (const g of gramsA) if (gramsB.has(g)) overlap++;
  return overlap / Math.max(gramsA.size, gramsB.size);
}

// Get top 3 matches
function getTopMatches(text, typeFilter) {
  if (!text || text.length < 2) return [];
  const normalizedText = text.replace(/[\s\u3000　]/g, '').toLowerCase();
  const results = [];

  const searchIn = typeFilter ? { [typeFilter]: KB[typeFilter] } : KB;
  for (const [typeKey, typeData] of Object.entries(searchIn)) {
    for (const [catName, items] of Object.entries(typeData.categories)) {
      for (const item of items) {
        const normItem = item.replace(/[\s\u3000　]/g, '').toLowerCase();
        const score = calcSimilarity(normalizedText, normItem);
        if (score > 0.1) results.push({ type: typeKey, category: catName, item, score });
      }
    }
  }

  results.sort((a, b) => b.score - a.score);
  return results.slice(0, 3);
}

// ==================== PROCESS IMAGE ====================
async function processImage(canvas) {
  const proc = document.getElementById('processing');
  const s1 = document.getElementById('step1');
  const s2 = document.getElementById('step2');
  const s3 = document.getElementById('step3');

  proc.classList.add('active');
  s1.className = 'step-item active';
  s2.className = 'step-item';
  s3.className = 'step-item';

  // Step 1: Color detection
  await sleep(300);
  const colorResult = detectColor(canvas);
  s1.className = 'step-item done';
  s2.className = 'step-item active';

  // Step 2: OCR
  let ocrText = '';
  try {
    ocrText = await runOCR(canvas, colorResult.color);
  } catch (e) {
    console.warn('OCR failed:', e);
  }
  s2.className = 'step-item done';
  s2.innerHTML = `<span class="step-dot"></span>テキストを読み取り${ocrText ? ' ✓' : ''}`;
  s3.className = 'step-item active';

  // Step 3: Classification
  await sleep(200);
  let type, confidence, category, matchItem;
  let colorConfidence = 0;

  // 色による大分類
  if (colorResult.color === 'red') {
    type = 'temodori';
    colorConfidence = colorResult.confidence;
  } else if (colorResult.color === 'blue') {
    type = 'temachi';
    colorConfidence = colorResult.confidence;
  } else {
    type = 'unknown';
    colorConfidence = 0;
  }

  // キーワードマッチングでカテゴリ特定
  let textScore = 0;
  if (ocrText) {
    const match = matchKeywords(ocrText);
    if (match && match.score > 0.15) {
      category = match.category;
      matchItem = match.item;
      textScore = match.score;
      // 色が不明の場合、テキストから判定
      if (type === 'unknown') {
        type = match.type;
      }
    }
  }

  // 信頼度統合 (色60% + テキスト40%)
  if (type !== 'unknown') {
    confidence = Math.round(Math.min((colorConfidence * 0.6 + textScore * 0.4) * 100, 100));
    confidence = Math.max(confidence, Math.round(colorConfidence * 100));
  } else {
    confidence = 0;
  }

  s3.className = 'step-item done';
  await sleep(150);
  proc.classList.remove('active');

  // Show result
  showResult({ type, confidence, category, matchItem, ocrText, imageData: currentImageData, colorResult });
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

    // Result card
    html += `<div class="result-card ${isTemodori ? 'temodori' : 'temachi'}">
      <div class="result-icon">${isTemodori ? '↩️' : '⏱️'}</div>
      <div class="result-type">${isTemodori ? '手 戻 り' : '手 待 ち'}</div>
      <div class="result-sub">${isTemodori ? 'やり直し' : '待ち時間'}</div>
      ${confLabel ? `<div class="result-confidence">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        ${confLabel} (${result.confidence}%)
      </div>` : ''}
    </div>`;

    // Detail card
    if (result.category || result.matchItem) {
      html += `<div class="result-detail">`;
      if (result.category) {
        html += `<div class="result-detail-row">
          <span class="detail-label">分類</span>
          <span class="detail-value">${result.category}</span>
        </div>`;
      }
      if (result.matchItem) {
        html += `<div class="result-detail-row">
          <span class="detail-label">類似項目</span>
          <span class="detail-value">${result.matchItem}</span>
        </div>`;
      }
      html += `</div>`;
    }

    // Color info
    html += `<div class="result-detail">
      <div class="result-detail-row">
        <span class="detail-label">色検出</span>
        <span class="detail-value">
          ${result.colorResult.color === 'red' ? '🔴 赤（手戻り）' : '🔵 青（手待ち）'}
        </span>
      </div>
      <div class="result-detail-row">
        <span class="detail-label">判定方法</span>
        <span class="detail-value">付箋の色から判定</span>
      </div>
    </div>`;

    // Switch button
    html += `<button class="btn-switch" onclick="switchType()" id="btnSwitch">
      ${isTemodori ? '⏱ 手待ちに変更する' : '↩ 手戻りに変更する'}
      <div class="switch-hint">判定が違う場合はこちら</div>
    </button>`;
  }

  body.innerHTML = html;
  body.scrollTop = 0;

  // Save to history (except unknown)
  if (!isUnknown) {
    const entry = {
      id: Date.now(),
      type: result.type,
      confidence: result.confidence,
      category: result.category || '',
      matchItem: result.matchItem || '',
      ocrText: result.ocrText || '',
      imageData: result.imageData,
      time: new Date().toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' })
    };
    history.unshift(entry);
    saveHistory();
    updateBadge();
  }

  // Store current result for switching
  window._currentResult = result;

  showScreen('screenResult');
}

function manualSelect(type) {
  const result = window._currentResult;
  result.type = type;
  result.confidence = 100;
  showResult(result);
}

function reclassifyManual() {
  const input = document.getElementById('manualText');
  if (!input) return;
  const text = input.value.trim();
  if (!text) return;
  const result = window._currentResult;
  result.ocrText = text;
  // キーワードマッチングで再判定
  const match = matchKeywords(text);
  if (match && match.score > 0.15) {
    result.category = match.category;
    result.matchItem = match.item;
    // テキストが別タイプを示唆する場合でも色判定を優先
  }
  // 履歴の最新エントリを更新
  if (history.length > 0) {
    history[0].ocrText = text;
    history[0].category = result.category || '';
    history[0].matchItem = result.matchItem || '';
    saveHistory();
  }
  showResult(result);
  showToast('テキストから分類しました');
}

function switchType() {
  const result = window._currentResult;
  result.type = result.type === 'temodori' ? 'temachi' : 'temodori';
  result.confidence = 100;
  // Remove the last added history entry (we'll re-add)
  if (history.length > 0 && history[0].id === window._lastHistoryId) {
    history.shift();
  }
  showResult(result);
  showToast('判定を変更しました');
}

// ==================== HISTORY ====================
function showHistory() {
  const body = document.getElementById('historyBody');
  const btnClear = document.getElementById('btnClearHistory');

  if (history.length === 0) {
    btnClear.style.display = 'none';
    body.innerHTML = `<div class="empty-state">
      <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M12 8v4l3 3"/><circle cx="12" cy="12" r="9"/></svg>
      <p>まだ撮影した付箋がありません。<br>付箋を撮影してみましょう！</p>
    </div>`;
  } else {
    btnClear.style.display = '';
    const tCount = history.filter(h => h.type === 'temodori').length;
    const mCount = history.filter(h => h.type === 'temachi').length;

    let html = `<div class="summary-cards">
      <div class="summary-card temodori">
        <div class="summary-icon">↩️</div>
        <div class="summary-label">手戻り</div>
        <div class="summary-count">${tCount}<span class="summary-unit"> 件</span></div>
      </div>
      <div class="summary-card temachi">
        <div class="summary-icon">⏱️</div>
        <div class="summary-label">手待ち</div>
        <div class="summary-count">${mCount}<span class="summary-unit"> 件</span></div>
      </div>
    </div>`;

    html += `<div class="history-section-title">判定履歴（${history.length}件）</div>`;
    html += `<div class="history-list">`;

    for (const item of history) {
      const isT = item.type === 'temodori';
      const displayText = item.ocrText || item.matchItem || item.category || (isT ? '手戻り' : '手待ち');
      html += `<div class="history-item ${isT ? 'temodori' : 'temachi'}">
        ${item.imageData ? `<img class="history-thumb" src="${item.imageData}" alt="">` : '<div class="history-thumb"></div>'}
        <div class="history-info">
          <div class="history-type">${isT ? '↩ 手戻り' : '⏱ 手待ち'}</div>
          <div class="history-text">${displayText}</div>
          ${item.category ? `<div class="history-cat">${item.category}</div>` : ''}
        </div>
        <div class="history-time">${item.time}</div>
      </div>`;
    }

    html += `</div>`;
    body.innerHTML = html;
  }

  body.scrollTop = 0;
  showScreen('screenHistory');
}

function clearHistory() {
  if (confirm('履歴をすべてクリアしますか？')) {
    history = [];
    saveHistory();
    updateBadge();
    showHistory();
    showToast('履歴をクリアしました');
  }
}

function saveHistory() {
  // Only save last 100 entries, and don't save image data to localStorage to avoid quota
  const toSave = history.slice(0, 100).map(h => ({ ...h, imageData: '' }));
  try { localStorage.setItem('fj_history', JSON.stringify(toSave)); } catch(e) {}
  if (history.length > 0) window._lastHistoryId = history[0].id;
}

function updateBadge() {
  document.getElementById('badgeCount').textContent = history.length;
}

// ==================== NAVIGATION ====================
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => {
    if (s.id === id) {
      s.classList.remove('hidden', 'hidden-left');
    } else {
      // Current screen slides left, new screen slides in from right
      if (!s.classList.contains('hidden') && !s.classList.contains('hidden-left')) {
        s.classList.add('hidden-left');
      } else {
        s.classList.add('hidden');
      }
    }
  });
}

function backToCamera() {
  document.querySelectorAll('.screen').forEach(s => {
    if (s.id === 'screenCamera') {
      s.classList.remove('hidden', 'hidden-left');
    } else {
      s.classList.add('hidden');
    }
  });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ==================== INIT ====================
window.addEventListener('DOMContentLoaded', () => {
  updateBadge();
  initCamera();
  // バックグラウンドでTesseract.jsの日本語モデルを先読み
  setTimeout(() => initTesseract(), 1000);
});
</script>
</body>
</html>
