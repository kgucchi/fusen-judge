<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f172a">
<title>フセンジャッジ</title>
<link rel="manifest" href="manifest.json">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f172a;--bg2:#1e293b;--bg3:#334155;
  --text:#f8fafc;--text2:#94a3b8;--text3:#64748b;
  --red:#dc2626;--red-light:#fca5a5;--red-bg:rgba(220,38,38,.12);
  --blue:#2563eb;--blue-light:#93c5fd;--blue-bg:rgba(37,99,235,.12);
  --accent:#f59e0b;--accent2:#fbbf24;
  --card:#1e293b;--card-border:#334155;
  --radius:16px;--radius-sm:10px;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
html,body{
  height:100%;width:100%;overflow:hidden;
  font-family:-apple-system,BlinkMacSystemFont,'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;
  background:var(--bg);color:var(--text);
  -webkit-tap-highlight-color:transparent;
  -webkit-text-size-adjust:100%;
}

.screen{
  position:absolute;inset:0;
  display:flex;flex-direction:column;
  transition:transform .35s cubic-bezier(.4,0,.2,1),opacity .35s;
  will-change:transform,opacity;
  padding-top:var(--safe-top);
  padding-bottom:var(--safe-bottom);
}
.screen.hidden{pointer-events:none;opacity:0;transform:translateX(100%)}
.screen.hidden-left{pointer-events:none;opacity:0;transform:translateX(-30%)}

.header{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 20px;min-height:56px;
  background:rgba(15,23,42,.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(255,255,255,.06);
  z-index:10;position:relative;
}
.header-title{
  font-size:18px;font-weight:800;letter-spacing:.5px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.header-btn{
  background:rgba(255,255,255,.08);border:none;color:var(--text);
  font-size:13px;padding:8px 14px;border-radius:20px;
  display:flex;align-items:center;gap:6px;cursor:pointer;
  transition:background .2s;
}
.header-btn:active{background:rgba(255,255,255,.15)}
.header-btn svg{width:16px;height:16px}
.badge{
  background:var(--accent);color:#000;font-size:11px;font-weight:700;
  min-width:20px;height:20px;border-radius:10px;
  display:inline-flex;align-items:center;justify-content:center;padding:0 6px;
}

.camera-body{flex:1;display:flex;flex-direction:column;position:relative;overflow:hidden}
.video-wrap{
  flex:1;position:relative;display:flex;align-items:center;justify-content:center;
  background:#000;overflow:hidden;
}
#video{width:100%;height:100%;object-fit:cover}
.guide-frame{
  position:absolute;width:72%;aspect-ratio:1.2;
  border:2.5px dashed rgba(255,255,255,.5);border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  transition:border-color .3s,box-shadow .3s;pointer-events:none;
}
.guide-text{
  position:absolute;bottom:16px;
  background:rgba(0,0,0,.6);backdrop-filter:blur(8px);
  padding:8px 18px;border-radius:20px;
  font-size:13px;color:rgba(255,255,255,.85);pointer-events:none;white-space:nowrap;
}
.camera-controls{
  padding:20px 20px calc(20px + var(--safe-bottom));
  display:flex;flex-direction:column;align-items:center;gap:12px;
  background:linear-gradient(to top,var(--bg) 60%,transparent);
  position:relative;z-index:2;
}
.btn-capture{
  width:76px;height:76px;border-radius:50%;border:4px solid var(--accent);
  background:transparent;cursor:pointer;position:relative;transition:transform .15s;
}
.btn-capture::after{
  content:'';position:absolute;inset:6px;border-radius:50%;
  background:var(--accent);transition:transform .1s;
}
.btn-capture:active{transform:scale(.92)}
.btn-capture:active::after{transform:scale(.85)}
.camera-sub-btns{display:flex;gap:12px}
.btn-gallery{
  background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);
  color:var(--text);padding:10px 20px;border-radius:25px;
  font-size:14px;cursor:pointer;display:flex;align-items:center;gap:6px;transition:background .2s;
}
.btn-gallery:active{background:rgba(255,255,255,.2)}
#fileInput{display:none}

.camera-hint{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  text-align:center;color:var(--text2);z-index:3;
}
.camera-hint svg{width:48px;height:48px;margin-bottom:12px;opacity:.4}
.camera-hint p{font-size:14px;line-height:1.6}

.processing{
  position:absolute;inset:0;z-index:100;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:rgba(15,23,42,.92);backdrop-filter:blur(20px);
  opacity:0;pointer-events:none;transition:opacity .3s;
}
.processing.active{opacity:1;pointer-events:auto}
.spinner{
  width:64px;height:64px;border-radius:50%;
  border:3px solid var(--bg3);border-top-color:var(--accent);
  animation:spin .8s linear infinite;margin-bottom:24px;
}
@keyframes spin{to{transform:rotate(360deg)}}
.processing-text{font-size:16px;color:var(--text2);text-align:center;line-height:1.6}

.result-body{
  flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:16px 20px calc(100px + var(--safe-bottom));
}
.result-image{
  width:100%;aspect-ratio:4/3;object-fit:cover;
  border-radius:var(--radius);margin-bottom:16px;
  border:1px solid var(--card-border);
}
.result-ocr{
  background:var(--card);border:1px solid var(--card-border);
  border-radius:var(--radius-sm);padding:14px 16px;margin-bottom:16px;
}
.result-ocr-label{font-size:12px;color:var(--text3);margin-bottom:6px;display:flex;align-items:center;gap:6px}
.result-ocr-text{font-size:17px;line-height:1.6;color:var(--text)}

.result-card{
  border-radius:var(--radius);padding:24px 20px;margin-bottom:16px;
  text-align:center;position:relative;overflow:hidden;
  animation:slideUp .4s cubic-bezier(.16,1,.3,1) forwards;
}
@keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
.result-card.temodori{background:linear-gradient(135deg,#dc2626,#b91c1c)}
.result-card.temachi{background:linear-gradient(135deg,#2563eb,#1d4ed8)}
.result-icon{font-size:40px;margin-bottom:8px}
.result-type{font-size:34px;font-weight:900;letter-spacing:4px;color:#fff;text-shadow:0 2px 8px rgba(0,0,0,.3)}
.result-sub{font-size:16px;color:rgba(255,255,255,.8);margin-top:4px}
.result-confidence{
  display:inline-flex;align-items:center;gap:6px;
  margin-top:12px;padding:6px 14px;
  background:rgba(255,255,255,.15);border-radius:20px;
  font-size:13px;color:rgba(255,255,255,.9);
}

.result-detail{
  background:var(--card);border:1px solid var(--card-border);
  border-radius:var(--radius-sm);padding:16px;margin-bottom:16px;
}
.result-detail-row{
  display:flex;justify-content:space-between;align-items:flex-start;padding:8px 0;
}
.result-detail-row+.result-detail-row{border-top:1px solid var(--card-border)}
.detail-label{font-size:13px;color:var(--text3);flex-shrink:0;width:90px}
.detail-value{font-size:15px;color:var(--text);text-align:right;flex:1}

.btn-switch{
  display:block;width:100%;padding:14px;
  background:transparent;border:1.5px solid var(--card-border);
  color:var(--text2);font-size:15px;border-radius:var(--radius-sm);
  cursor:pointer;text-align:center;transition:all .2s;margin-bottom:12px;
}
.btn-switch:active{background:rgba(255,255,255,.05);border-color:var(--text3)}
.btn-switch .switch-hint{font-size:12px;color:var(--text3);margin-top:2px}

.result-footer,.history-footer{
  position:fixed;bottom:0;left:0;right:0;
  padding:16px 20px calc(16px + var(--safe-bottom));
  background:linear-gradient(to top,var(--bg) 70%,transparent);z-index:10;
}
.btn-next{
  width:100%;padding:18px;border:none;border-radius:var(--radius);
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#000;font-size:17px;font-weight:700;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:8px;
  transition:transform .15s;box-shadow:0 4px 20px rgba(245,158,11,.3);
}
.btn-next:active{transform:scale(.97)}

.summary-cards{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.summary-card{border-radius:var(--radius-sm);padding:20px 16px;text-align:center;border:1px solid}
.summary-card.temodori{background:var(--red-bg);border-color:rgba(220,38,38,.2)}
.summary-card.temachi{background:var(--blue-bg);border-color:rgba(37,99,235,.2)}
.summary-icon{font-size:24px;margin-bottom:4px}
.summary-label{font-size:13px;color:var(--text2);margin-bottom:4px}
.summary-count{font-size:32px;font-weight:800}
.summary-card.temodori .summary-count{color:var(--red-light)}
.summary-card.temachi .summary-count{color:var(--blue-light)}
.summary-unit{font-size:14px;font-weight:400;color:var(--text2)}

.history-section-title{font-size:13px;color:var(--text3);margin-bottom:12px;padding-left:4px}
.history-list{display:flex;flex-direction:column;gap:10px}
.history-item{
  background:var(--card);border:1px solid var(--card-border);
  border-radius:var(--radius-sm);padding:14px 16px;
  display:flex;align-items:center;gap:14px;
  border-left:4px solid;
}
.history-item.temodori{border-left-color:var(--red)}
.history-item.temachi{border-left-color:var(--blue)}
.history-thumb{width:48px;height:48px;border-radius:8px;object-fit:cover;flex-shrink:0;background:var(--bg3)}
.history-info{flex:1;min-width:0}
.history-type{font-size:12px;font-weight:700;margin-bottom:2px}
.history-item.temodori .history-type{color:var(--red-light)}
.history-item.temachi .history-type{color:var(--blue-light)}
.history-text{font-size:14px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.history-cat{font-size:12px;color:var(--text3);margin-top:2px}
.history-time{font-size:12px;color:var(--text3);flex-shrink:0}

.history-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 20px calc(100px + var(--safe-bottom))}

.empty-state{text-align:center;padding:60px 20px;color:var(--text3)}
.empty-state svg{width:64px;height:64px;margin-bottom:16px;opacity:.3}
.empty-state p{font-size:15px;line-height:1.6}

#canvas{display:none}
.flash{position:fixed;inset:0;background:#fff;z-index:200;opacity:0;pointer-events:none}
.flash.active{animation:flash .3s ease-out}
@keyframes flash{0%{opacity:.8}100%{opacity:0}}

.toast{
  position:fixed;top:calc(16px + var(--safe-top));left:50%;transform:translateX(-50%) translateY(-100px);
  background:var(--card);border:1px solid var(--card-border);
  padding:12px 24px;border-radius:25px;font-size:14px;color:var(--text);
  z-index:300;transition:transform .3s cubic-bezier(.16,1,.3,1);
  box-shadow:0 8px 30px rgba(0,0,0,.4);white-space:nowrap;
}
.toast.show{transform:translateX(-50%) translateY(0)}

/* Setup screen */
.setup-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px}
.setup-logo{font-size:64px;margin-bottom:16px}
.setup-title{font-size:28px;font-weight:900;margin-bottom:8px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.setup-sub{font-size:14px;color:var(--text2);margin-bottom:32px;text-align:center;line-height:1.6}
.setup-input-wrap{width:100%;max-width:360px;margin-bottom:16px}
.setup-label{font-size:13px;color:var(--text3);margin-bottom:8px;display:block}
.setup-input{
  width:100%;padding:14px 16px;border-radius:var(--radius-sm);
  border:1px solid var(--card-border);background:var(--card);
  color:var(--text);font-size:16px;outline:none;
  transition:border-color .2s;
}
.setup-input:focus{border-color:var(--accent)}
.setup-btn{
  width:100%;max-width:360px;padding:16px;border:none;border-radius:var(--radius);
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#000;font-size:17px;font-weight:700;cursor:pointer;
  margin-top:8px;transition:transform .15s;
}
.setup-btn:active{transform:scale(.97)}
.setup-btn:disabled{opacity:.4;cursor:not-allowed}
.setup-hint{font-size:12px;color:var(--text3);margin-top:16px;text-align:center;line-height:1.6;max-width:360px}
.setup-error{color:var(--red-light);font-size:13px;margin-top:8px;display:none}

.candidates-list{display:flex;flex-direction:column;gap:6px;margin-top:8px}
.candidate-item{
  padding:10px 12px;border-radius:8px;cursor:pointer;
  background:rgba(255,255,255,.04);border:1px solid var(--card-border);
  transition:all .2s;display:flex;justify-content:space-between;align-items:center;
}
.candidate-item:active{background:rgba(255,255,255,.08)}
.candidate-item.selected{border-color:var(--accent);background:rgba(245,158,11,.08)}
.candidate-name{font-size:14px;color:var(--text)}
.candidate-cat{font-size:12px;color:var(--text3)}
.candidate-score{font-size:12px;color:var(--accent);font-weight:600}

@media(orientation:landscape) and (max-height:500px){.landscape-warn{display:flex!important}}
.landscape-warn{
  display:none;position:fixed;inset:0;z-index:999;
  background:var(--bg);align-items:center;justify-content:center;
  flex-direction:column;gap:16px;color:var(--text2);font-size:16px;
}
</style>
</head>
<body>

<div class="landscape-warn">
  <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="2"><rect x="6" y="12" width="36" height="24" rx="3"/><path d="M24 32v4M20 36h8"/></svg>
  <p>縦向きでご利用ください</p>
</div>
<div class="flash" id="flash"></div>
<div class="toast" id="toast"></div>

<!-- ==================== SETUP SCREEN ==================== -->
<div class="screen" id="screenSetup">
  <div class="setup-body">
    <div class="setup-logo">📋</div>
    <div class="setup-title">フセンジャッジ</div>
    <div class="setup-sub">付箋の手戻り・手待ちをAIが瞬時に判定<br>PSC勉強会グループディスカッション用</div>
    <div class="setup-input-wrap">
      <label class="setup-label">Gemini APIキー</label>
      <input type="password" class="setup-input" id="apiKeyInput" placeholder="AIza...">
      <div class="setup-error" id="setupError"></div>
    </div>
    <button class="setup-btn" id="setupBtn" onclick="saveApiKey()">はじめる</button>
    <div class="setup-hint">
      APIキーはこの端末にのみ保存されます。<br>
      <a href="https://aistudio.google.com/apikey" target="_blank" style="color:var(--accent)">Google AI Studio</a> で無料取得できます。
    </div>
  </div>
</div>

<!-- ==================== CAMERA SCREEN ==================== -->
<div class="screen hidden" id="screenCamera">
  <div class="header">
    <div class="header-title">フセンジャッジ</div>
    <button class="header-btn" onclick="showHistory()">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 8v4l3 3"/><circle cx="12" cy="12" r="9"/></svg>
      履歴
      <span class="badge" id="badgeCount">0</span>
    </button>
  </div>
  <div class="camera-body">
    <div class="video-wrap">
      <video id="video" autoplay playsinline muted></video>
      <div class="guide-frame" id="guideFrame">
        <span class="guide-text">付箋をここに合わせてね</span>
      </div>
      <div class="camera-hint" id="cameraHint" style="display:none">
        <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M6.827 6.175A2.31 2.31 0 015.186 7.23c-.38.054-.757.112-1.134.175C2.999 7.58 2.25 8.507 2.25 9.574V18a2.25 2.25 0 002.25 2.25h15A2.25 2.25 0 0021.75 18V9.574c0-1.067-.75-1.994-1.802-2.169a47.865 47.865 0 00-1.134-.175 2.31 2.31 0 01-1.64-1.055l-.822-1.316a2.192 2.192 0 00-1.736-1.039 48.774 48.774 0 00-5.232 0 2.192 2.192 0 00-1.736 1.039l-.821 1.316z"/><circle cx="12" cy="13.5" r="3.5"/></svg>
        <p>カメラを起動しています...</p>
      </div>
    </div>
    <div class="camera-controls">
      <button class="btn-capture" id="btnCapture" onclick="capture()" aria-label="撮影"></button>
      <div class="camera-sub-btns">
        <button class="btn-gallery" onclick="document.getElementById('fileInput').click()">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M3 16l5-5 4 4 3-3 6 6"/><circle cx="15.5" cy="8.5" r="1.5"/></svg>
          写真から選ぶ
        </button>
      </div>
      <input type="file" id="fileInput" accept="image/*" onchange="handleFile(event)">
    </div>
  </div>
  <div class="processing" id="processing">
    <div class="spinner"></div>
    <div class="processing-text" id="processingText">Gemini AIが解析中...</div>
  </div>
</div>

<!-- ==================== RESULT SCREEN ==================== -->
<div class="screen hidden" id="screenResult">
  <div class="header">
    <button class="header-btn" onclick="backToCamera()" style="padding-left:10px">
      <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7"/></svg>
      戻る
    </button>
    <div class="header-title">判定結果</div>
    <div style="width:60px"></div>
  </div>
  <div class="result-body" id="resultBody"></div>
  <div class="result-footer">
    <button class="btn-next" onclick="backToCamera()">
      <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M6.827 6.175A2.31 2.31 0 015.186 7.23c-.38.054-.757.112-1.134.175C2.999 7.58 2.25 8.507 2.25 9.574V18a2.25 2.25 0 002.25 2.25h15A2.25 2.25 0 0021.75 18V9.574c0-1.067-.75-1.994-1.802-2.169a47.865 47.865 0 00-1.134-.175 2.31 2.31 0 01-1.64-1.055l-.822-1.316a2.192 2.192 0 00-1.736-1.039 48.774 48.774 0 00-5.232 0 2.192 2.192 0 00-1.736 1.039l-.821 1.316z"/><circle cx="12" cy="13.5" r="3.5"/></svg>
      もう1枚撮る
    </button>
  </div>
</div>

<!-- ==================== HISTORY SCREEN ==================== -->
<div class="screen hidden" id="screenHistory">
  <div class="header">
    <button class="header-btn" onclick="backToCamera()" style="padding-left:10px">
      <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7"/></svg>
      戻る
    </button>
    <div class="header-title">撮影履歴</div>
    <button class="header-btn" id="btnClearHistory" onclick="clearHistory()" style="color:var(--red-light);display:none">クリア</button>
  </div>
  <div class="history-body" id="historyBody"></div>
  <div class="history-footer">
    <button class="btn-next" onclick="backToCamera()">
      <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M6.827 6.175A2.31 2.31 0 015.186 7.23c-.38.054-.757.112-1.134.175C2.999 7.58 2.25 8.507 2.25 9.574V18a2.25 2.25 0 002.25 2.25h15A2.25 2.25 0 0021.75 18V9.574c0-1.067-.75-1.994-1.802-2.169a47.865 47.865 0 00-1.134-.175 2.31 2.31 0 01-1.64-1.055l-.822-1.316a2.192 2.192 0 00-1.736-1.039 48.774 48.774 0 00-5.232 0 2.192 2.192 0 00-1.736 1.039l-.821 1.316z"/><circle cx="12" cy="13.5" r="3.5"/></svg>
      撮影に戻る
    </button>
  </div>
</div>

<canvas id="canvas"></canvas>

<script>
// ==================== KNOWLEDGE BASE (for prompt) ====================
const KB_PROMPT = `
## 手戻り（やり直し）の原因 8分類
1. 図面・設計: 図面の寸法が現場と合わない、設備図と建築図の不整合、図面が古いバージョン、納まり未考慮、図面差し替え多すぎ、詳細図が出ない、施工図の承認遅い、図面の読み間違い、設計変更の連絡漏れ
2. 指示・情報伝達: 口頭指示で記録なし、変更指示が届かない、朝礼で聞いてない、職長への伝達が曖昧、監督の指示が二転三転、元請と専門の認識ズレ、申し送りなし、周知不十分、指示を勘違い、LINE・メール未確認
3. 材料・資機材: 発注ミス、サンプルと実物の相違、納期遅れ、色番・品番間違い、数量不足、間違った材料使用、検品不足、代替品確認不足、保管場所が悪い、先行手配なし
4. 技術・施工品質: 墨出し間違い、施工要領書未読、未熟な職人、施工手順ミス、品質基準勘違い、養生期間不足、下地処理不十分、初めての工法で失敗、工具選定ミス、安全優先で手順変更
5. 工程・段取り: 前工程未完了、工程見通し甘い、職人手配ミス、他業種との取り合い不調整、段取り替えタイミング悪い、同時施工で干渉、準備不足、無理な工程、休日夜間作業調整不足、先行してやりすぎ
6. 検査・承認: 施主検査でやり直し指示、中間検査未実施、監理者確認待ちで手戻り、竣工間際の追加指摘、写真撮影タイミング逃し、隠蔽前検査忘れ、検査基準未達、サンプル承認前施工、是正対応遅れ、元請検査指摘多数
7. 人間関係・コミュニケーション: 職人同士連携不足、監督不在、言いにくい雰囲気、ベテラン思い込み、若手が質問しづらい、業者間押し付け合い、報連相不足、職長が職人未把握、元請との関係悪い、協力会社多すぎ
8. 外部要因: 雨で養生飛んだ、施主追加要望、近隣クレームで変更、天候不良、施主仕様変更、法規制変更、既存建物の図面相違、地中埋設物、近隣取り決め変更、資材入荷遅延

## 手待ち（待ち時間）の原因 8分類
1. 前工程の遅れ: 前職が終わってない、コンクリート養生待ち、躯体精度出し長引く、前の業者人手不足、墨出しがまだ、下地不陸調整中、前工程やり直し、鉄筋検査待ち、型枠バラシ待ち、前職の材料待ち
2. 資材・機材の問題: 材料未着、発注ミスで材料違い、納期遅延連絡なし、材料数量不足、機械故障中、レンタル機械来ない、検品で不良発覚、図面変更で材料作り直し、メーカー欠品、運送遅延
3. 揚重・運搬: タワクレ他職使用中、揚重計画調整つかず、エレベーター競合、荷揚げ順番待ち、クレーン段取り待ち、仮設通路塞がり、重機移動待ち、揚重時間割り振り遅れ、リフト点検で使用不可、荷揚げ業者手配ミス
4. 検査・承認待ち: 監督検査待ち、施主検査日程未定、設計事務所確認待ち、写真撮影待ち、官庁検査日程調整中、品質検査結果待ち、サンプル承認下りず、中間検査段取り待ち
5. 指示・情報待ち: 監督が現場にいない、施工図が上がらない、指示二転三転、詳細図面未着、変更内容連絡待ち、朝礼で指示なし、納まり確認返事待ち、メーカー回答待ち、寸法最終確認待ち、職長会議決定待ち
6. 他職種との調整: 取り合い調整つかない、先行配管邪魔、電気と設備で場所競合、作業エリア重複、他職段取り優先、足場共用調整つかず、他職騒音で作業不可、スペース譲り合い、施工順序調整難航、他職との打合せ待ち
7. 天候・安全規制: 雨で作業中止、強風でクレーン使えず、暑さで作業時間制限、雷注意報で待機、台風接近で養生、近隣クレームで停止、騒音規制時間帯、粉塵対策養生待ち、安全パトロールで中断
8. 人員・配置: 職人数不足、応援職人来ない、熟練工休み、新人だけで進まない、複数現場掛け持ち、職長が別現場、人工割り振りミス、急な欠員、他現場へ人員移動、協力会社手配遅れ
`;

// ==================== STATE ====================
let history = JSON.parse(localStorage.getItem('fj_history') || '[]');
let currentImageData = null;
let apiKey = localStorage.getItem('fj_apikey') || '';

// ==================== SETUP ====================
function saveApiKey() {
  const input = document.getElementById('apiKeyInput');
  const key = input.value.trim();
  if (!key) {
    showSetupError('APIキーを入力してください');
    return;
  }
  if (!key.startsWith('AIza')) {
    showSetupError('正しいGemini APIキーを入力してください（AIza...で始まります）');
    return;
  }
  apiKey = key;
  localStorage.setItem('fj_apikey', key);
  showScreen('screenCamera');
  initCamera();
}

function showSetupError(msg) {
  const el = document.getElementById('setupError');
  el.textContent = msg;
  el.style.display = 'block';
}

// ==================== CAMERA ====================
async function initCamera() {
  const video = document.getElementById('video');
  const hint = document.getElementById('cameraHint');
  try {
    hint.style.display = 'flex';
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } },
      audio: false
    });
    video.srcObject = stream;
    hint.style.display = 'none';
  } catch (e) {
    hint.querySelector('p').textContent = 'カメラが使えません。\n「写真から選ぶ」をお使いください。';
    document.getElementById('btnCapture').style.display = 'none';
    document.getElementById('guideFrame').style.display = 'none';
  }
}

function capture() {
  const video = document.getElementById('video');
  if (!video.srcObject) return;
  const canvas = document.getElementById('canvas');
  const w = video.videoWidth || 1280;
  const h = video.videoHeight || 720;
  canvas.width = w; canvas.height = h;
  canvas.getContext('2d').drawImage(video, 0, 0, w, h);
  document.getElementById('flash').classList.add('active');
  setTimeout(() => document.getElementById('flash').classList.remove('active'), 350);
  if (navigator.vibrate) navigator.vibrate(50);
  currentImageData = canvas.toDataURL('image/jpeg', 0.8);
  processImage();
}

function handleFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    const img = new Image();
    img.onload = function() {
      const canvas = document.getElementById('canvas');
      let w = img.width, h = img.height;
      if (w > 1600) { h = h * 1600 / w; w = 1600; }
      if (h > 1600) { w = w * 1600 / h; h = 1600; }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      currentImageData = canvas.toDataURL('image/jpeg', 0.8);
      processImage();
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
  e.target.value = '';
}

// ==================== GEMINI API ====================
async function callGemini(base64Image) {
  const mimeType = 'image/jpeg';
  const imageData = base64Image.replace(/^data:image\/\w+;base64,/, '');

  const body = {
    contents: [{
      parts: [
        {
          text: `あなたは建設現場の「手戻り（やり直し）」と「手待ち（待ち時間）」を分類する専門AIです。

以下の画像は建設業の勉強会で参加者が付箋に手書きした内容です。

## あなたのタスク
1. 付箋に書かれた手書きテキストを正確に読み取ってください
2. その内容が「手戻り」か「手待ち」かを判定してください
3. 以下の分類基準から最も近いカテゴリと項目を特定してください
4. 候補を3つ挙げてください（最も近い順）

## 判定のヒント
- 赤い付箋 = 手戻り（やり直し）の経験
- 青い付箋 = 手待ち（待ち時間）の経験
- 付箋の色も判定の参考にしてください
- 「〜し直した」「間違えた」「やり直し」→ 手戻りの可能性が高い
- 「〜待ち」「来ない」「まだ」「使えない」→ 手待ちの可能性が高い

${KB_PROMPT}

## 出力形式（必ずこのJSON形式で）
\`\`\`json
{
  "ocrText": "読み取ったテキスト",
  "type": "temodori または temachi",
  "confidence": 0-100の数値,
  "category": "8分類のうち該当するカテゴリ名",
  "matchItem": "最も近い具体的な原因項目",
  "stickyColor": "red, blue, or unknown",
  "candidates": [
    {"category": "カテゴリ名", "item": "項目名", "score": 0-100},
    {"category": "カテゴリ名", "item": "項目名", "score": 0-100},
    {"category": "カテゴリ名", "item": "項目名", "score": 0-100}
  ],
  "reasoning": "判定理由を1文で"
}
\`\`\`

画像に付箋が写っていない場合や文字が読み取れない場合は、ocrTextを空文字にし、typeを"unknown"としてください。`
        },
        {
          inlineData: { mimeType, data: imageData }
        }
      ]
    }],
    generationConfig: {
      temperature: 0.1,
      maxOutputTokens: 1024,
    }
  };

  const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`;
  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });

  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    if (res.status === 401 || res.status === 403) {
      throw new Error('APIキーが無効です。設定を確認してください。');
    }
    throw new Error(err.error?.message || `API error: ${res.status}`);
  }

  const data = await res.json();
  const text = data.candidates?.[0]?.content?.parts?.[0]?.text || '';

  // Extract JSON from response
  const jsonMatch = text.match(/\{[\s\S]*\}/);
  if (!jsonMatch) throw new Error('AIの応答を解析できませんでした');

  return JSON.parse(jsonMatch[0]);
}

// ==================== PROCESS IMAGE ====================
async function processImage() {
  const proc = document.getElementById('processing');
  const procText = document.getElementById('processingText');
  proc.classList.add('active');
  procText.textContent = 'Gemini AIが解析中...';

  try {
    const result = await callGemini(currentImageData);
    proc.classList.remove('active');

    if (result.type === 'unknown' || !result.ocrText) {
      showResult({
        type: 'unknown', confidence: 0, category: '', matchItem: '',
        ocrText: result.ocrText || '', candidates: [],
        imageData: currentImageData, reasoning: ''
      });
    } else {
      showResult({
        type: result.type,
        confidence: result.confidence || 80,
        category: result.category || '',
        matchItem: result.matchItem || '',
        ocrText: result.ocrText || '',
        candidates: result.candidates || [],
        imageData: currentImageData,
        reasoning: result.reasoning || '',
        stickyColor: result.stickyColor || 'unknown'
      });
    }
  } catch (e) {
    proc.classList.remove('active');
    console.error('Gemini error:', e);
    showToast(e.message || 'エラーが発生しました');

    if (e.message?.includes('APIキー')) {
      apiKey = '';
      localStorage.removeItem('fj_apikey');
      showScreen('screenSetup');
    }
  }
}

// ==================== SHOW RESULT ====================
function showResult(result) {
  const body = document.getElementById('resultBody');
  const isTemodori = result.type === 'temodori';
  const isUnknown = result.type === 'unknown';

  let confLabel = '';
  if (result.confidence >= 80) confLabel = '高い確信度';
  else if (result.confidence >= 50) confLabel = '中程度の確信度';
  else if (result.confidence > 0) confLabel = '低い確信度';

  let html = '';

  // Image
  if (result.imageData) {
    html += `<img class="result-image" src="${result.imageData}" alt="撮影画像">`;
  }

  // OCR text
  if (result.ocrText) {
    html += `<div class="result-ocr">
      <div class="result-ocr-label">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 12h6m-3-3v6m-7 4h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
        AI読み取りテキスト
      </div>
      <div class="result-ocr-text">「${result.ocrText}」</div>
    </div>`;
  }

  if (isUnknown) {
    html += `
      <div style="text-align:center;padding:30px 0">
        <div style="font-size:48px;margin-bottom:12px">🤔</div>
        <div style="font-size:20px;font-weight:700;margin-bottom:8px">判別できませんでした</div>
        <div style="font-size:14px;color:var(--text2);margin-bottom:24px">どちらに該当しますか？</div>
        <div style="display:flex;gap:12px">
          <button onclick="manualSelect('temodori')" style="flex:1;padding:20px 16px;border-radius:var(--radius);border:2px solid var(--red);background:var(--red-bg);color:var(--red-light);font-size:18px;font-weight:700;cursor:pointer">
            ↩ 手戻り<br><span style="font-size:13px;font-weight:400;color:var(--text2)">やり直し</span>
          </button>
          <button onclick="manualSelect('temachi')" style="flex:1;padding:20px 16px;border-radius:var(--radius);border:2px solid var(--blue);background:var(--blue-bg);color:var(--blue-light);font-size:18px;font-weight:700;cursor:pointer">
            ⏱ 手待ち<br><span style="font-size:13px;font-weight:400;color:var(--text2)">待ち時間</span>
          </button>
        </div>
      </div>`;
  } else {
    // Result card
    html += `<div class="result-card ${isTemodori ? 'temodori' : 'temachi'}">
      <div class="result-icon">${isTemodori ? '↩️' : '⏱️'}</div>
      <div class="result-type">${isTemodori ? '手 戻 り' : '手 待 ち'}</div>
      <div class="result-sub">${isTemodori ? 'やり直し' : '待ち時間'}</div>
      ${confLabel ? `<div class="result-confidence">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        ${confLabel} (${result.confidence}%)
      </div>` : ''}
    </div>`;

    // Detail card
    html += `<div class="result-detail">`;
    if (result.category) {
      html += `<div class="result-detail-row">
        <span class="detail-label">分類</span>
        <span class="detail-value">${result.category}</span>
      </div>`;
    }
    if (result.matchItem) {
      html += `<div class="result-detail-row">
        <span class="detail-label">最も近い項目</span>
        <span class="detail-value">${result.matchItem}</span>
      </div>`;
    }
    if (result.reasoning) {
      html += `<div class="result-detail-row">
        <span class="detail-label">判定理由</span>
        <span class="detail-value" style="font-size:13px;color:var(--text2)">${result.reasoning}</span>
      </div>`;
    }
    if (result.stickyColor && result.stickyColor !== 'unknown') {
      html += `<div class="result-detail-row">
        <span class="detail-label">付箋の色</span>
        <span class="detail-value">${result.stickyColor === 'red' ? '🔴 赤' : '🔵 青'}</span>
      </div>`;
    }
    html += `</div>`;

    // Candidates
    if (result.candidates && result.candidates.length > 0) {
      html += `<div class="result-detail">
        <div style="font-size:13px;color:var(--text3);margin-bottom:10px">類似する原因候補</div>
        <div class="candidates-list">`;
      result.candidates.forEach((c, i) => {
        const selected = c.item === result.matchItem;
        html += `<div class="candidate-item${selected ? ' selected' : ''}" onclick="selectCandidate(${i})">
          <div>
            <div class="candidate-name">${selected ? '● ' : (i+1)+'. '}${c.item}</div>
            <div class="candidate-cat">${c.category}</div>
          </div>
          <div class="candidate-score">${c.score}%</div>
        </div>`;
      });
      html += `</div></div>`;
    }

    // Switch button
    html += `<button class="btn-switch" onclick="switchType()">
      ${isTemodori ? '⏱ 手待ちに変更する' : '↩ 手戻りに変更する'}
      <div class="switch-hint">判定が違う場合はこちら</div>
    </button>`;
  }

  body.innerHTML = html;
  body.scrollTop = 0;

  // Save to history
  if (!isUnknown) {
    const entry = {
      id: Date.now(),
      type: result.type,
      confidence: result.confidence,
      category: result.category || '',
      matchItem: result.matchItem || '',
      ocrText: result.ocrText || '',
      imageData: result.imageData,
      time: new Date().toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' })
    };
    history.unshift(entry);
    saveHistory();
    updateBadge();
  }

  window._currentResult = result;
  showScreen('screenResult');
}

function manualSelect(type) {
  const r = window._currentResult;
  r.type = type;
  r.confidence = 100;
  showResult(r);
}

function selectCandidate(idx) {
  const r = window._currentResult;
  if (r.candidates && r.candidates[idx]) {
    r.category = r.candidates[idx].category;
    r.matchItem = r.candidates[idx].item;
    if (history.length > 0) {
      history[0].category = r.category;
      history[0].matchItem = r.matchItem;
      saveHistory();
    }
    showResult(r);
    showToast('候補を選択しました');
  }
}

function switchType() {
  const r = window._currentResult;
  r.type = r.type === 'temodori' ? 'temachi' : 'temodori';
  r.confidence = 100;
  if (history.length > 0) {
    history[0].type = r.type;
    saveHistory();
  }
  showResult(r);
  showToast('判定を変更しました');
}

// ==================== HISTORY ====================
function showHistory() {
  const body = document.getElementById('historyBody');
  const btnClear = document.getElementById('btnClearHistory');

  if (history.length === 0) {
    btnClear.style.display = 'none';
    body.innerHTML = `<div class="empty-state">
      <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M12 8v4l3 3"/><circle cx="12" cy="12" r="9"/></svg>
      <p>まだ撮影した付箋がありません。<br>付箋を撮影してみましょう！</p>
    </div>`;
  } else {
    btnClear.style.display = '';
    const tCount = history.filter(h => h.type === 'temodori').length;
    const mCount = history.filter(h => h.type === 'temachi').length;

    let html = `<div class="summary-cards">
      <div class="summary-card temodori">
        <div class="summary-icon">↩️</div>
        <div class="summary-label">手戻り</div>
        <div class="summary-count">${tCount}<span class="summary-unit"> 件</span></div>
      </div>
      <div class="summary-card temachi">
        <div class="summary-icon">⏱️</div>
        <div class="summary-label">手待ち</div>
        <div class="summary-count">${mCount}<span class="summary-unit"> 件</span></div>
      </div>
    </div>`;

    html += `<div class="history-section-title">判定履歴（${history.length}件）</div>`;
    html += `<div class="history-list">`;

    for (const item of history) {
      const isT = item.type === 'temodori';
      const displayText = item.ocrText || item.matchItem || item.category || (isT ? '手戻り' : '手待ち');
      html += `<div class="history-item ${isT ? 'temodori' : 'temachi'}">
        ${item.imageData ? `<img class="history-thumb" src="${item.imageData}" alt="">` : '<div class="history-thumb"></div>'}
        <div class="history-info">
          <div class="history-type">${isT ? '↩ 手戻り' : '⏱ 手待ち'}</div>
          <div class="history-text">${displayText}</div>
          ${item.category ? `<div class="history-cat">${item.category}</div>` : ''}
        </div>
        <div class="history-time">${item.time}</div>
      </div>`;
    }
    html += `</div>`;
    body.innerHTML = html;
  }
  body.scrollTop = 0;
  showScreen('screenHistory');
}

function clearHistory() {
  if (confirm('履歴をすべてクリアしますか？')) {
    history = [];
    saveHistory();
    updateBadge();
    showHistory();
    showToast('履歴をクリアしました');
  }
}

function saveHistory() {
  const toSave = history.slice(0, 100).map(h => ({ ...h, imageData: '' }));
  try { localStorage.setItem('fj_history', JSON.stringify(toSave)); } catch(e) {}
}

function updateBadge() {
  document.getElementById('badgeCount').textContent = history.length;
}

// ==================== NAVIGATION ====================
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => {
    if (s.id === id) {
      s.classList.remove('hidden', 'hidden-left');
    } else if (!s.classList.contains('hidden') && !s.classList.contains('hidden-left')) {
      s.classList.add('hidden-left');
    } else {
      s.classList.add('hidden');
    }
  });
}

function backToCamera() {
  document.querySelectorAll('.screen').forEach(s => {
    if (s.id === 'screenCamera') s.classList.remove('hidden', 'hidden-left');
    else s.classList.add('hidden');
  });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ==================== INIT ====================
window.addEventListener('DOMContentLoaded', () => {
  updateBadge();
  if (apiKey) {
    document.getElementById('screenSetup').classList.add('hidden');
    document.getElementById('screenCamera').classList.remove('hidden');
    initCamera();
  }
});
</script>
</body>
</html>
